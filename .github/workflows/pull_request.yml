name: Pull Request Check

on:
  pull_request:
    branches: [ main ]

jobs:
  quality_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Lint and Test
        run: npx turbo run lint test
